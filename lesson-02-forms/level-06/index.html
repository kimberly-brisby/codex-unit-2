<body>
  <h1>Food Choices</h1>
  <form>
    <fieldset>
      <legend>Favorite food </legend>
      <input type="radio" name="food" value="pizza" id="pizza" />
      <label for="pizza">Pizza</label>
      <input type="radio" name="food" value="taco" id="taco" />
      <label for="taco">Taco</label>
      <input type="radio" name="food" value="burger" id="burger" />
      <label for="burger">Burger</label>
    </fieldset>

    <label> <input type="checkbox" name="food" /> I like food
    </label>

    <button type="submit">submit </button>
  </form>
</body>

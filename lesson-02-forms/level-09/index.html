<body>
  <h1>Select Username and Password</h1>
  <form>
    <label for="username">Username</label>
    <input id="username" name="username" type="text required minlength=" 5" maxlength="10">
    <br>
    <label for="password">Password</label>
    <input id="password" name="password" type="text" min="6" max="15">
    <br>
    <button type="submit">Submit</button>
  </form>
</body>

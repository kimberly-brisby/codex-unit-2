<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Level 14 — Mini-project</title>
    <script src="script.js" defer></script>
  </head>
  <body>
    <form id="sample-form">
      <label>Name<input name="name" type="text" required /></label>
      <label>Message<textarea name="message"></textarea></label>
      <label>Volume<input name="volume" type="range" min="0" max="10" /></label>
      <label><input type="radio" name="color" value="red" /> Red</label>
      <label><input type="radio" name="color" value="blue" /> Blue</label>
      <label><input type="checkbox" name="subscribe" /> Subscribe</label>
      <button type="submit">Submit</button>
    </form>
    <div id="summary">
      Summary will appear here after successful submission.
    </div>
    <p>
      Build a handler that prevents default navigation, reads named inputs via
      `form.elements`, validates fields, displays the summary above, and calls
      `form.reset()` on success.
    </p>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Level 11 — textarea-range</title>
    <script src="script.js" defer></script>
  </head>
  <body>
    <form id="sample-form">
      <textarea name="message"></textarea>
      <input name="volume" type="range" min="0" max="100" />
      <button type="submit">Submit</button>
    </form>
    <p>
      Use the range and textarea controls to practice reading values; convert
      the range value with `Number()` in your handler.
    </p>
  </body>
</html>
